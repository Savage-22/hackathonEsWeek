# nginx interno del contenedor frontend: sirve la SPA en el puerto 80 (interno).
# El host lo mapea a 3002. El fallback a index.html es para react-router y la PWA.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No cachear el service worker ni el index (para que la PWA reciba updates)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Assets con hash: cache larga
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
