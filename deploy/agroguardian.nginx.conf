# Server block para el HOST (/etc/nginx/sites-available/agroguardian).
# Sin bloque 443: certbot lo agrega solo al correr:
#   sudo certbot --nginx -d agroguardian.devteamaadj.xyz
#
# IMPORTANTE: el backend monta sus rutas bajo /api y sirve fotos en /uploads,
# por eso el proxy_pass va SIN barra final (conserva el path original).

server {
    listen 80;
    server_name agroguardian.devteamaadj.xyz;

    # Permitir subir fotos de aplicaciones (multer) sin error 413
    client_max_body_size 10m;

    # API
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fotos subidas (servidas por el backend en /uploads)
    location /uploads/ {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Healthcheck del backend (opcional)
    location = /health {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
    }

    # Frontend (SPA / PWA)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
