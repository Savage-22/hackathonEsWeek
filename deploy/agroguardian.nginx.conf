# Server block para el HOST (/etc/nginx/sites-available/agroguardian).
# Mismo estilo que silp/kiosko. Sin bloque 443: lo agrega certbot al correr:
#   sudo certbot --nginx -d agroguardian.devteamaadj.xyz
#
# Puertos: front 3002, back 4001 (3000/4000 ya los usa silp en este host).
#
# NOTA: a diferencia de silp, el proxy_pass de /api/ va SIN barra final.
# El backend de AgroGuardian monta sus rutas BAJO /api, así que el path
# /api debe conservarse (con barra final nginx lo eliminaría y rompería el login).

server {
    server_name agroguardian.devteamaadj.xyz;

    # Permitir subir fotos de aplicaciones (multer) sin error 413
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://localhost:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://localhost:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 80;
}
